<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Sphere | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700&family=Inter:wght@400;900&family=Audiowide&family=Rajdhani:wght@600&family=JetBrains+Mono&family=Michroma&family=Space+Mono&family=Syncopate:wght@700&family=Teko:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071');
            --accent: #ffd700;
            --font-clock: 'Bebas Neue', sans-serif;
            --glass: rgba(0, 0, 0, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-image) no-repeat center center/cover;
            color: white; font-family: 'Inter', sans-serif; overflow: hidden; transition: background 0.5s ease;
        }

        #quote-box { position: absolute; top: 50px; text-align: center; width: 80%; font-size: 1.2rem; color: var(--accent); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); letter-spacing: 2px; }
        .date-display { font-size: 1.4rem; letter-spacing: 8px; margin-bottom: 30px; opacity: 0.8; }
        .clock { display: flex; gap: 25px; }
        .card { width: 200px; height: 260px; background: var(--glass); border-radius: 20px; display: flex; justify-content: center; align-items: center; font-family: var(--font-clock); font-size: 180px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .card::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }

        .pomo-btn { margin-top: 50px; padding: 12px 35px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-family: 'Orbitron'; border-radius: 50px; transition: 0.3s; }
        .pomo-btn:hover { background: var(--accent); color: black; }

        .sidebar { position: absolute; left: -320px; top: 0; width: 320px; height: 100%; background: rgba(0,0,0,0.95); padding: 50px 25px; transition: 0.4s; z-index: 100; border-right: 1px solid var(--accent); }
        .sidebar.active { left: 0; }
        .toggle { position: absolute; right: -55px; top: 30px; background: #000; width: 55px; height: 55px; cursor: pointer; display: flex; justify-content: center; align-items: center; border-radius: 0 12px 12px 0; color: var(--accent); font-size: 24px; }
        
        input, select { width: 100%; padding: 10px; background: #111; color: white; border: 1px solid #333; margin: 10px 0 20px; border-radius: 5px; }
        .footer { position: absolute; bottom: 30px; font-family: 'Orbitron'; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="quote-box">Welcome to Nova Sphere</div>

    <div class="sidebar" id="sidebar">
        <div class="toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">⚙️</div>
        
        <label style="font-size: 10px; color: var(--accent);">CHOOSE FONT</label>
        <select id="fontPicker">
            <option value="'Bebas Neue'">Bebas Neue</option><option value="'Orbitron'">Orbitron</option>
            <option value="'Audiowide'">Audiowide</option><option value="'Rajdhani'">Rajdhani</option>
            <option value="'Teko'">Teko</option><option value="'Inter'">Inter Black</option>
        </select>

        <label style="font-size: 10px; color: var(--accent);">UPLOAD BACKGROUND</label>
        <input type="file" id="bgUpload" accept="image/*">
        
        <label style="font-size: 10px; color: var(--accent);">CHANGE USER NAME</label>
        <input type="text" id="userNameInput" placeholder="Enter name...">
        <button onclick="updateName()" style="width:100%; padding:10px; background:var(--accent); border:none; color:black; font-weight:bold; cursor:pointer;">UPDATE NAME</button>
    </div>

    <div class="date-display" id="date">-- --- ----</div>
    <div class="clock">
        <div class="card" id="h">00</div><div class="card" id="m">00</div><div class="card" id="s">00</div>
    </div>

    <button class="pomo-btn" onclick="openPomo()">OPEN POMODORO WINDOW</button>
    <div class="footer">NOVA SPHERE DASHBOARD</div>

    <script>
        let userName = localStorage.getItem('nova_user') || "";

        window.onload = () => {
            if(!userName) {
                userName = prompt("Enter your name:", "Jitumoni");
                localStorage.setItem('nova_user', userName);
            }
            document.getElementById('userNameInput').value = userName;
            updateQuote();
        };

        function updateName() {
            userName = document.getElementById('userNameInput').value;
            localStorage.setItem('nova_user', userName);
            alert("Name updated!");
            updateQuote();
        }

        document.getElementById('bgUpload').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(${event.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        };

        const baseQuotes = ["Keep pushing", "Success is near", "Stay focused", "Make it happen", "Build the future"];
        function updateQuote() {
            const q = baseQuotes[Math.floor(Math.random() * baseQuotes.length)];
            document.getElementById('quote-box').innerText = `${q}, ${userName}!`;
        }
        setInterval(updateQuote, 5000);

        // --- FIXED 12-HOUR CLOCK ---
        function tick() {
            const n = new Date();
            let h = n.getHours();
            
            // Convert to 12h format
            h = h % 12;
            h = h ? h : 12; 

            document.getElementById('h').innerText = String(h).padStart(2, '0');
            document.getElementById('m').innerText = String(n.getMinutes()).padStart(2, '0');
            document.getElementById('s').innerText = String(n.getSeconds()).padStart(2, '0');
            const opt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = n.toLocaleDateString('en-US', opt).toUpperCase();
        }
        setInterval(tick, 1000); tick();

        function openPomo() {
            const win = window.open("", "Pomo", "width=400,height=500");
            win.document.write(`<html><body style="background:#111;color:#ffd700;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;"><h1>25:00</h1><button onclick="start()">START</button><script>let t=1500;function start(){setInterval(()=>{if(t>0){t--;let m=Math.floor(t/60),s=t%60;document.querySelector('h1').innerText=m+":"+(s<10?'0'+s:s)}},1000)}<\/script></body></html>`);
        }

        document.getElementById('fontPicker').onchange = (e) => {
            document.documentElement.style.setProperty('--font-clock', e.target.value);
        };
    </script>
</body>
</html>
