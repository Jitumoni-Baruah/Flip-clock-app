<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Sphere | Original 3D Restored</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700&family=Inter:wght@400;900&family=Audiowide&family=Rajdhani:wght@600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071');
            --accent: #ffd700;
            --font-clock: 'Bebas Neue', sans-serif;
            --card-w: 200px;
            --card-h: 260px;
            --font-size: 180px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-image) no-repeat center center/cover;
            color: white; font-family: 'Inter', sans-serif; overflow: hidden;
        }

        #quote-box { position: absolute; top: 40px; text-align: center; width: 80%; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }

        /* --- RESTORED 3D FLIP ENGINE --- */
        .clock { display: flex; gap: 20px; perspective: 1000px; }
        .flip-card {
            position: relative; width: var(--card-w); height: var(--card-h);
            font-family: var(--font-clock); font-size: var(--font-size);
            line-height: var(--card-h); text-align: center; border-radius: 12px;
        }

        .digital {
            position: absolute; left: 0; width: 100%; height: 50%;
            overflow: hidden; background: #1a1d21;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }

        .top { top: 0; border-radius: 12px 12px 0 0; z-index: 1; border-bottom: 1px solid rgba(0,0,0,0.5); }
        .bottom { bottom: 0; border-radius: 0 0 12px 12px; line-height: 0; z-index: 0; background: #111; }

        .flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: #1a1d21; transform-origin: bottom; z-index: 5;
            transform-style: preserve-3d; border-radius: 12px 12px 0 0;
            transition: transform 0.5s ease-in;
        }
        .flap .back { transform: rotateX(-180deg); line-height: 0; background: #111; border-radius: 0 0 12px 12px; }

        .flipping .flap { transform: rotateX(-180deg); }

        /* Sidebar & Controls */
        .sidebar { position: absolute; left: -320px; top: 0; width: 320px; height: 100%; background: rgba(0,0,0,0.95); padding: 40px 25px; transition: 0.4s; z-index: 100; border-right: 1px solid var(--accent); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .toggle { position: absolute; right: -55px; top: 30px; background: #000; width: 55px; height: 55px; cursor: pointer; display: flex; justify-content: center; align-items: center; border-radius: 0 12px 12px 0; color: var(--accent); border: 1px solid var(--accent); border-left: none; }
        
        label { font-size: 10px; color: var(--accent); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #111; color: white; border: 1px solid #333; margin-bottom: 20px; border-radius: 5px; }

        .pomo-btn { margin-top: 40px; padding: 12px 35px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-family: 'Orbitron'; border-radius: 50px; }
    </style>
</head>
<body>

    <div id="quote-box">Nova Sphere Restored</div>

    <div class="sidebar" id="sidebar">
        <div class="toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">⚙️</div>
        
        <label>TIME FORMAT</label>
        <select id="timeFormat"><option value="24">24 HOUR</option><option value="12">12 HOUR</option></select>

        <label>CLOCK SCALE (Font Size)</label>
        <input type="range" id="sizeSlider" min="100" max="300" value="180">

        <label>CHOOSE FONT</label>
        <select id="fontPicker">
            <option value="'Bebas Neue'">Bebas Neue</option>
            <option value="'Orbitron'">Orbitron</option>
            <option value="'Audiowide'">Audiowide</option>
            <option value="'Rajdhani'">Rajdhani</option>
        </select>

        <label>UPLOAD BACKGROUND</label>
        <input type="file" id="bgUpload" accept="image/*">
        
        <label>USER NAME</label>
        <input type="text" id="userNameInput">
        <button onclick="save()" style="width:100%; padding:10px; background:var(--accent); border:none; color:black; font-weight:bold; cursor:pointer;">SAVE SETTINGS</button>
    </div>

    <div class="clock">
        <div class="flip-card" id="hCard"><div class="digital top">00</div><div class="digital bottom">00</div><div class="flap"><div class="digital front">00</div><div class="digital back">00</div></div></div>
        <div class="flip-card" id="mCard"><div class="digital top">00</div><div class="digital bottom">00</div><div class="flap"><div class="digital front">00</div><div class="digital back">00</div></div></div>
        <div class="flip-card" id="sCard"><div class="digital top">00</div><div class="digital bottom">00</div><div class="flap"><div class="digital front">00</div><div class="digital back">00</div></div></div>
    </div>

    <button class="pomo-btn" onclick="openPomo()">OPEN POMODORO WINDOW</button>

    <script>
        let userName = localStorage.getItem('nova_user') || "Jitumoni";
        const root = document.documentElement;

        // Scaling Logic
        document.getElementById('sizeSlider').oninput = (e) => {
            let val = e.target.value;
            root.style.setProperty('--font-size', val + 'px');
            root.style.setProperty('--card-w', (val * 1.1) + 'px');
            root.style.setProperty('--card-h', (val * 1.4) + 'px');
        };

        // Name & Quote Setup
        window.onload = () => { document.getElementById('userNameInput').value = userName; updateQuote(); };
        function save() { userName = document.getElementById('userNameInput').value; localStorage.setItem('nova_user', userName); alert("Saved!"); }

        function updateQuote() {
            const qs = ["Focus", "Grind", "Success"];
            document.getElementById('quote-box').innerText = `${qs[Math.floor(Math.random()*qs.length)]}, ${userName}!`;
        }
        setInterval(updateQuote, 5000);

        // Image Upload
        document.getElementById('bgUpload').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(${ev.target.result})`;
                reader.readAsDataURL(file);
            }
        };

        // Restored Flip Engine
        function updateFlip(id, val) {
            const card = document.getElementById(id);
            const top = card.querySelector('.top'), bottom = card.querySelector('.bottom');
            const front = card.querySelector('.front'), back = card.querySelector('.back');

            if (top.innerText === val) return;
            front.innerText = top.innerText;
            back.innerText = val;
            top.innerText = val;

            card.classList.remove('flipping');
            void card.offsetWidth;
            card.classList.add('flipping');

            setTimeout(() => { bottom.innerText = val; card.classList.remove('flipping'); }, 500);
        }

        function tick() {
            const n = new Date();
            let h = n.getHours();
            if(document.getElementById('timeFormat').value === '12') h = h % 12 || 12;
            updateFlip('hCard', String(h).padStart(2,'0'));
            updateFlip('mCard', String(n.getMinutes()).padStart(2,'0'));
            updateFlip('sCard', String(n.getSeconds()).padStart(2,'0'));
        }
        setInterval(tick, 1000); tick();

        function openPomo() {
            window.open("", "Pomo", "width=300,height=400").document.write(`
                <body style="background:#000;color:#ffd700;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
                <h1>25:00</h1><button onclick="setInterval(()=>{},1000)">START</button></body>
            `);
        }

        document.getElementById('fontPicker').onchange = (e) => root.style.setProperty('--font-clock', e.target.value);
    </script>
</body>
</html>
